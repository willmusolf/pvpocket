{% extends "base.html" %}

{% block title %}My Collection - PvPocket{% endblock %}

{% block content %}
<style>

    .card-body {
        position: relative;
        padding-bottom: 0; 
    }
    .energy-icon-wrapper {
        width: 24px; /* Keep small for this context */
        height: 24px;
        border-radius: 50%;
        margin-right: 4px; /* Slightly reduced */
        margin-bottom: 4px; /* Slightly reduced */
        margin-top: 0px; /* Adjusted from -6px to prevent overlap issues */
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .energy-icon {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .card-body h5.card-title {
        white-space: nowrap; 
        overflow: hidden;    
        text-overflow: ellipsis; 
        max-width: 100%;     
        display: block; 
        margin-top: 0.5rem;
        margin-bottom: 1rem; /* Increased padding for better spacing */
        min-height: 1.2em;
    }

    .collection-main-content {
        width: 100%;
        max-width: 1390px; 
        padding-right: var(--bs-gutter-x, .75rem);
        padding-left: var(--bs-gutter-x, .75rem);
        margin-right: auto;
        margin-left: auto;
    }

    .deck-header-right-actions {
        position: absolute;
        top: 0.6rem; /* Adjusted slightly */
        right: 0.6rem; /* Adjusted slightly */
        display: flex; 
        align-items: center; 
        gap: 0.3rem; /* Slightly increased gap */
        z-index: 10; 
    }
    /* Ensure badge has some min-width if text is short */
    .deck-header-right-actions .badge {
        padding: 0.35em 0.55em; /* Adjust padding for badge size */
        font-size: 0.75rem; /* Slightly smaller font for badge */
    }


    .deck-actions-dropdown .dropdown-toggle {
        background-color: transparent;
        border: none;
        box-shadow: none;
        padding: 0.3rem 0.5rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--bs-secondary-color, #6c757d);
        transition: background-color 0.15s ease-in-out, color 0.15s ease-in-out;
        margin-top: 1.5px;
    }

    .deck-actions-dropdown .dropdown-toggle:hover,
    .deck-actions-dropdown .dropdown-toggle:focus,
    .deck-actions-dropdown .dropdown-toggle:active {
        background-color: rgba(0, 0, 0, 0.075);
        color: var(--bs-body-color, #212529);
        box-shadow: none;
        border: none;
    }

    [data-theme="dark"] .deck-actions-dropdown .dropdown-toggle {
            color: var(--bs-gray-500, #adb5bd);
    }

    [data-theme="dark"] .deck-actions-dropdown .dropdown-toggle:hover,
    [data-theme="dark"] .deck-actions-dropdown .dropdown-toggle:focus,
    [data-theme="dark"] .deck-actions-dropdown .dropdown-toggle:active {
        background-color: rgba(255, 255, 255, 0.1);
        color: var(--bs-light, #f8f9fa);
    }

    .deck-actions-dropdown .dropdown-toggle i.bi-three-dots-vertical {
        font-size: 1.3rem;
        vertical-align: middle;
    }

    .deck-actions-dropdown .dropdown-menu {
        min-width: 190px;
    }

    .deck-actions-dropdown .dropdown-item {
        cursor: pointer;
        display: flex;
        align-items: center;
    }
    .deck-actions-dropdown .dropdown-item .bi {
        width: 1.5em;
    }

    .deck-cover-cards-area {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 110px; 
        margin-bottom: 0.25rem; /* Reduced margin */
        gap: 3px; 
        position: relative; 
        border-radius: 5px; 
        overflow: hidden; 
        transition: all 0.15s ease-out;
    }

    .deck-cover-cards-area .cover-card-image-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 85px;  
        width: 60px;   
        min-height: 75px; 
        min-width: 53px;  
        transition: all 0.15s ease-out;
    }

    .deck-cover-cards-area .cover-card-image-wrapper:first-child { 
        height: 125px; 
        width: 90px;  
        min-height: 110px;
        min-width: 78px;  
    }

    .deck-cover-cards-area .cover-card-image-wrapper img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 3px; 
        transition: all 0.15s ease-out;
    }

    .deck-cover-cards-area.has-three-cards .cover-card-image-wrapper:nth-child(1) { order: 1; } 
    .deck-cover-cards-area.has-three-cards .cover-card-image-wrapper:nth-child(2) { order: 2; } 
    .deck-cover-cards-area.has-three-cards .cover-card-image-wrapper:nth-child(3) { order: 3; } 

    .deck-not-full-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); 
        background-color: rgba(148, 148, 148, 0.78); 
        color: #fff; 
        padding: 0.25rem 0.6rem; 
        border-radius: 4px; 
        font-weight: bold;
        font-size: 0.8rem; 
        text-align: center;
        white-space: nowrap; 
        pointer-events: none; 
        z-index: 5; 
    }

    [data-theme="dark"] .deck-not-full-overlay {
        background-color: rgba(148, 148, 148, 0.78); 
    }

    .row { 
        flex-wrap: wrap; 
        justify-content: flex-start; 
    }
    
    .card-body > .row { 
        margin-left: -0.375rem; /* Adjusted to a slightly larger gap than 0.25rem */
        margin-right: -0.375rem; 
    }

    .col-12.col-sm-6.col-md-4.col-lg-3.mb-4 { 
        padding-right: 0.375rem; /* Adjusted */
        padding-left: 0.375rem;  /* Adjusted */
        transition: width 0.2s ease-out, flex-basis 0.2s ease-out, opacity 0.2s ease-out;
    }

    .card.h-100 {
        width: 100%; 
        display: flex; 
        flex-direction: column; 
        /* Removed hover transform and shadow from here */
        transition: box-shadow 0.2s ease-out; /* Keep shadow transition if you have other shadow effects */
    }


    .deck-actions-dropdown .dropdown-toggle::after {
        display: none; 
    }

    /* Media Queries for column count and sizing */
    /* Extra small screens (phones) - 1 COLUMN */
    @media (max-width: 575.98px) { 
        .col-12.col-sm-6.col-md-4.col-lg-3.mb-4 {
            min-width: 280px; /* Increased min-width for very small screens */
            width: 100%;
            flex-basis: 100%;
        }
        .deck-header-right-actions { /* Adjust badge/dropdown position on smallest screens if needed */
            top: 0.4rem;
            right: 0.4rem;
        }
        .deck-header-right-actions .badge {
            font-size: 0.7rem; /* Slightly smaller badge text */
            padding: 0.3em 0.45em;
        }
        .energy-icon-wrapper { /* Ensure energy icons don't cause overflow with badge */
            margin-top: 0.25rem; /* Provide a bit more space if badge is above */
        }
    }

    /* Small screens (tablets portrait) - Aim for 2 columns */
    /* Adjusted breakpoint: Start 2-column layout earlier */
    @media (min-width: 576px) and (max-width: 991.98px) { /* Was 767.98px, now 991.98px */
        .col-12.col-sm-6.col-md-4.col-lg-3.mb-4 {
            flex: 0 0 50%; 
            max-width: 50%;
            min-width: 270px; /* Increased min-width for 2-column */
        }
    }

    /* Medium screens (tablets landscape, small desktops) - Aim for 3 columns */
    /* Adjusted breakpoint: Start 3-column layout earlier */
    @media (min-width: 992px) and (max-width: 1199.98px) { /* Was 768px to 991.98px */
        .col-12.col-sm-6.col-md-4.col-lg-3.mb-4 {
            flex: 0 0 33.333333%; 
            max-width: 33.333333%;
            min-width: 260px; /* Adjusted min-width */
        }
    }

    /* Large screens - Aim for 4 columns */
    @media (min-width: 1200px) { /* Was 992px for 4 columns, adjusted if needed based on above */
        .col-12.col-sm-6.col-md-4.col-lg-3.mb-4 {
            flex: 0 0 25%; 
            max-width: 25%;
            min-width: 260px; /* Adjusted min-width for 4 columns */
        }
    }

    /*
  Ensures the shimmer animation is defined.
*/
@keyframes shimmer {
    100% {
        transform: translateX(100%);
    }
}

/*
  A robust skeleton placeholder for a single deck card.
  Its size is determined by its content, just like the real card.
*/
.deck-card-placeholder {
    width: 100%;
    background-color: var(--settings-bg, #fefefe);
    border: 1px solid var(--border-color, #dee2e6);
    border-radius: var(--bs-card-border-radius, 0.375rem);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    /* Add position and overflow here for the shimmer effect */
    position: relative;
    overflow: hidden;
}

/* The visible shimmer effect on the placeholder container */
.deck-card-placeholder::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* More visible shimmer */
    background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.05), transparent);
    transform: translateX(-100%);
    animation: shimmer 1.5s infinite;
}

[data-theme="dark"] .deck-card-placeholder {
    background-color: var(--bs-card-bg);
}

[data-theme="dark"] .deck-card-placeholder::after {
    /* More visible shimmer for dark mode */
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
}


/*
  The invisible internal structure that gives the placeholder its correct size.
*/
.skeleton-item {
    background-color: transparent; /* These are invisible */
    border-radius: 4px;
}
.skeleton-types {
    height: 24px;
    width: 60%;
    margin-bottom: 0.75rem;
}
.skeleton-covers {
    height: 125px;
    width: 100%;
    margin-bottom: 0.5rem;
}
.skeleton-title {
    height: 20px;
    width: 80%;
    margin-top: 0.5rem;
}

    </style>

    <div class="collection-main-content">
        <script id="page-data" type="application/json">{{ page_data | tojson | safe }}</script>
        <div class="row">
            <div class="col-12 mb-4">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3>My Decks</h3>
                        <a href="{{ url_for('decks.list_decks') }}" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Create New Deck
                        </a>
                    </div>
                    <div class="card-body position-relative"> {# IMPORTANT: card-body must be position-relative #}
                        <div id="decks-container" class="row">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

<script>
    // Helper function to safely escape HTML content
    function escapeHTML(str) {
        if (str === null || str === undefined) return '';
        return str.toString().replace(/[&<>"']/g, match => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[match]));
    }

    // Helper function to generate HTML for a deck card, using data passed from the server
    function createDeckCardHTML(deck, pageData) {
        const deckEditUrl = `${pageData.deck_builder_url}?edit=${deck.deck_id}`;
        const deckCopyUrl = `${pageData.deck_builder_url}?copy_from=${deck.deck_id}`;
        const energyUrls = pageData.energy_icon_urls;

        const energyIconsHTML = (deck.types || []).map(type => {
            const iconUrl = energyUrls[type] || '';
            return `<div class="energy-icon-wrapper"><img src="${escapeHTML(iconUrl)}" alt="${escapeHTML(type)}" class="energy-icon"></div>`;
        }).join('');

        const coverCardsHTML = (deck.resolved_cover_cards || []).map(cover => {
            const imgPath = cover.display_image_path || '';
            return `<div class="cover-card-image-wrapper is-loading"><img data-src="${escapeHTML(imgPath)}" alt="${escapeHTML(cover.name)}" title="${escapeHTML(cover.name)}"></div>`;
        }).join('');

        const notUsableHTML = deck.card_count < 20 ? '<div class="deck-not-full-overlay">DECK NOT USABLE</div>' : '';

        return `
            <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
                <div class="card h-100">
                    <div class="card-body position-relative">
                        <div class="deck-header-right-actions">
                            <span class="badge bg-primary">${escapeHTML(deck.card_count)}/20 cards</span>
                            <div class="dropdown deck-actions-dropdown">
                                <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Deck Actions"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><a class="dropdown-item" href="${deckEditUrl}"><i class="bi bi-pencil-square me-2"></i>Edit</a></li>
                                    <li><a class="dropdown-item" href="${deckCopyUrl}"><i class="bi bi-files me-2"></i>Make a copy</a></li>
                                    <li><a class="dropdown-item" href="${pageData.battle_sim_url}"><i class="bi bi-joystick me-2"></i>Load into Battle Sim</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item text-danger deck-action-delete" href="#" data-deck-id="${escapeHTML(deck.deck_id)}" data-deck-name="${escapeHTML(deck.name)}"><i class="bi bi-trash me-2"></i>Delete</a></li>
                                </ul>
                            </div>
                        </div>
                        <div class="d-flex mb-2">${energyIconsHTML}</div>
                        <div class="deck-cover-cards-area">${coverCardsHTML}${notUsableHTML}</div>
                        <h5 class="card-title">${escapeHTML(deck.name)}</h5>
                    </div>
                </div>
            </div>`;
    }

    // Initializes lazy loading for images
    function initializeImageLazyLoader() {
        if (!('IntersectionObserver' in window)) return;
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const wrapper = img.parentElement;
                    img.onload = () => {
                        wrapper.classList.remove('is-loading');
                        wrapper.classList.add('is-loaded');
                    };
                    img.onerror = () => wrapper.classList.remove('is-loading');
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '250px' });
        document.querySelectorAll('.cover-card-image-wrapper img[data-src]').forEach(img => imageObserver.observe(img));
    }

    document.addEventListener('DOMContentLoaded', function() {
        const pageDataEl = document.getElementById('page-data');
        const decksContainer = document.getElementById('decks-container');
        if (!pageDataEl || !decksContainer) return;

        const pageData = JSON.parse(pageDataEl.textContent);

        // 1. Show a single, temporary loading indicator while we fetch data.
        decksContainer.innerHTML = `<div class="col-12 text-center p-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></div>`;

        // 2. Fetch the real deck data.
        fetch(pageData.api_url)
            .then(response => response.ok ? response.json() : Promise.reject(response))
            .then(data => {
                decksContainer.innerHTML = ''; // 3. Clear the loading indicator.

                if (data.decks && data.decks.length > 0) {
                    // 4. Render the final card structure for each deck.
                    // Each card's image wrappers will have the 'is-loading' class by default,
                    // causing them to appear as shimmering placeholders.
                    data.decks.forEach(deck => {
                        const deckCardHTML = createDeckCardHTML(deck, pageData);
                        decksContainer.insertAdjacentHTML('beforeend', deckCardHTML);
                    });

                    // 5. Activate the image lazy loader to begin loading images,
                    // which will automatically replace the shimmer with the image when ready.
                    initializeImageLazyLoader();
                } else {
                    // Handle the case where the user has no decks.
                    decksContainer.innerHTML = `<div class="col-12"><div class="alert alert-info"><p>You don't have any decks yet. <a href="${pageData.deck_builder_url}">Create your first deck!</a></p></div></div>`;
                }
            })
            .catch(error => {
                console.error('Error fetching decks:', error);
                decksContainer.innerHTML = `<div class="col-12"><div class="alert alert-danger">Could not load decks. Please try again later.</div></div>`;
            });

        // Event delegation for deck actions.
        document.body.addEventListener('click', function(event) {
            const deleteLink = event.target.closest('.deck-action-delete');
            if (deleteLink) {
                event.preventDefault();
                const { deckId, deckName } = deleteLink.dataset;
                if (confirm(`Are you sure you want to delete the deck "${deckName}"?`)) {
                    fetch(`/api/decks/${deckId}`, { method: 'DELETE' })
                        .then(res => res.ok ? deleteLink.closest('.col-12').remove() : alert('Failed to delete deck.'));
                }
            }
        });
    });
</script>
{% endblock %}
