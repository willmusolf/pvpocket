{% extends "base.html" %}

{% block title %}Error - Pokémon TCG Pocket{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">An Error Occurred</h3>
                </div>
                <div class="card-body text-center py-5">
                    <i class="fas fa-exclamation-triangle text-danger fa-5x mb-4"></i>
                    <h4 class="mb-4">Oops! Something went wrong...</h4>
                    <p class="lead">{{ error }}</p>
                </div>
                <div class="card-footer text-center">
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-primary me-2">
                        <i class="fas fa-home me-2"></i> Return to Home
                    </a>
                    <button onclick="window.history.back()" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i> Go Back
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
